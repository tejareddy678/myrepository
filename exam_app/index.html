<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Exam App</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.3);
            top: -10%;
            left: -10%;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: rgba(236, 72, 153, 0.3);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(50px) scale(1.1);
            }
        }

        /* Glassmorphism Container */
        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2,
        h3 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 28px;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }

        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Exam Screen Layout */
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .timer {
            font-size: 18px;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .timer.urgent {
            animation: pulse 1s infinite;
            color: #fff;
            background: rgba(239, 68, 68, 0.6);
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .palette {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: center;
        }

        .palette button {
            padding: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            box-shadow: none;
            color: var(--text-muted);
        }

        .palette button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .palette button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            transform: scale(1.1);
        }

        .palette button.answered {
            border-color: var(--success);
            color: var(--success);
        }

        .quiz-container {
            min-height: 250px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .option {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            padding-left: 25px;
        }

        .option input {
            margin-right: 15px;
            accent-color: var(--primary);
            transform: scale(1.2);
            cursor: pointer;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        /* Certificate Screen Layout */
        .cert-card {
            text-align: center;
        }

        .cert-card h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .cert-details {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 16px;
            margin: 20px 0;
            border: 1px dashed var(--glass-border);
            text-align: left;
        }

        .cert-details p {
            margin-bottom: 10px;
            font-size: 16px;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        #examContainer,
        #certificate {
            display: none;
        }
    </style>
</head>

<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Main Dynamic Glassmorphism Container -->
    <div class="container" id="mainContainer">

        <!-- Start Screen -->
        <div id="startScreen" style="text-align: center; padding: 40px 20px;">
            <i class="fa-solid fa-graduation-cap"
                style="font-size: 60px; color: var(--primary); margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(99,102,241,0.5));"></i>
            <h2>Welcome to the Assessment</h2>
            <p>Please enter your full name to begin the examination.</p>
            <input type="text" id="username" placeholder="e.g. John Doe" autocomplete="off">
            <button onclick="startExam()"><i class="fa-solid fa-play"></i> Start Exam</button>
        </div>

        <!-- Exam Screen -->
        <div id="examContainer">
            <div class="exam-header">
                <div>
                    <h2
                        style="font-size: 20px; background: none; -webkit-text-fill-color: var(--text-main); margin: 0;">
                        Online Examination</h2>
                    <p style="margin: 0; font-size: 14px;"><i class="fa-solid fa-triangle-exclamation"
                            style="color: var(--secondary)"></i> Warnings: <span id="warnings">0</span>/3</p>
                </div>
                <div class="timer" id="timerBox">
                    <i class="fa-regular fa-clock"></i> <span id="time">120</span>s
                </div>
            </div>

            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div id="palette" class="palette"></div>

            <div id="quiz" class="quiz-container"></div>

            <div class="actions">
                <button class="btn-outline" onclick="prevQuestion()"><i class="fa-solid fa-arrow-left"></i>
                    Previous</button>
                <div style="flex:1"></div>
                <button onclick="nextQuestion()">Next <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <!-- Certificate Screen -->
        <div id="certificate" class="cert-card">
            <i class="fa-solid fa-award"
                style="font-size: 70px; color: #fbbf24; margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.4));"></i>
            <h2>Exam Completed</h2>
            <div id="result" style="font-size: 20px; font-weight: 500; margin-bottom: 20px; color: var(--success);">
            </div>

            <div class="cert-details">
                <p><span>Candidate Name:</span> <strong id="certName"></strong></p>
                <p><span>Final Score:</span> <strong id="certScore"></strong></p>
                <p><span>Date of Completion:</span> <strong id="certDate"></strong></p>
                <p><span>Certificate ID:</span> <strong id="certID"
                        style="color: var(--primary); font-family: monospace;"></strong></p>
            </div>

            <button id="downloadBtn" onclick="downloadCertificate()"><i class="fa-solid fa-file-pdf"></i> Download PDF
                Certificate</button>
        </div>
    </div>

    <script>
        /* PHP + MySQL FETCH API */
        async function saveResult(name, score, accuracy) {
            try {
                let response = await fetch("save_result.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: name,
                        score: score,
                        accuracy: accuracy,
                        date: new Date().toLocaleDateString()
                    })
                });
                let result = await response.json();
                if (result.success) {
                    console.log("Result saved successfully!");
                } else {
                    console.error("Error saving result: ", result.error);
                }
            } catch (err) {
                console.error("Fetch error - ensure XAMPP is running", err);
            }
        }

        /* ---------------- LOGIC ---------------- */
        document.addEventListener("contextmenu", e => e.preventDefault());

        let questions = [
            { question: "What is 2 + 2?", options: ["3", "4", "5", "6"], answer: "4" },
            { question: "What is the capital of India?", options: ["Delhi", "Mumbai", "Chennai", "Kolkata"], answer: "Delhi" },
            { question: "What does HTML stand for?", options: ["Hyper Text Markup Language", "High Text Machine Language", "None of the above", "Other"], answer: "Hyper Text Markup Language" },
            { question: "What is CSS primarily used for?", options: ["Styling UI", "Backend Server", "Database structuring", "Security encryption"], answer: "Styling UI" },
            { question: "Which language runs natively in standard web browsers?", options: ["Python", "Java", "JavaScript", "C++"], answer: "JavaScript" }
        ];

        questions.sort(() => Math.random() - 0.5);

        let index = 0;
        let score = 0;
        let answers = [];
        let timer;
        let warningCount = 0;

        window.startExam = function () {
            let name = document.getElementById("username").value.trim();
            if (!name) {
                alert("Please enter your name to proceed.");
                return;
            }
            enterFullscreen();

            document.getElementById("startScreen").style.display = "none";
            document.getElementById("examContainer").style.display = "block";
            document.getElementById("certName").innerText = name;

            createPalette();
            loadQuestion();
            startTimer();
        }

        function enterFullscreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && document.getElementById("examContainer").style.display === "block") {
                addWarning("Tab switching detected");
            }
        });

        document.addEventListener("fullscreenchange", () => {
            if (!document.fullscreenElement && document.getElementById("examContainer").style.display === "block") {
                // addWarning("Exited fullscreen");
                // commented out for local dev testability, user may re-enable
                console.log("Exited fullscreen");
            }
        });

        function addWarning(msg) {
            warningCount++;
            document.getElementById("warnings").innerText = warningCount;
            alert("Warning: " + msg);
            if (warningCount >= 3) {
                alert("Too many violations. Your exam layout is locked and submitted.");
                finishExam();
            }
        }

        function startTimer() {
            let time = 120;
            let timerBox = document.getElementById("timerBox");
            timer = setInterval(() => {
                time--;
                document.getElementById("time").innerText = time;
                if (time <= 30 && !timerBox.classList.contains("urgent")) {
                    timerBox.classList.add("urgent");
                }
                if (time <= 0) {
                    finishExam();
                }
            }, 1000);
        }

        function createPalette() {
            let palette = document.getElementById("palette");
            palette.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                let btn = document.createElement("button");
                btn.innerText = i + 1;
                btn.onclick = () => {
                    index = i;
                    loadQuestion();
                };
                palette.appendChild(btn);
            }
            updatePaletteUI();
        }

        function updatePaletteUI() {
            document.querySelectorAll(".palette button").forEach((b, i) => {
                b.className = "";
                if (i === index) b.classList.add("active");
                else if (answers[i]) b.classList.add("answered");
            });
        }

        function loadQuestion() {
            let q = questions[index];
            let html = "<h3 style='color: var(--text-muted); font-size: 16px; margin-bottom: 5px;'>Question " + (index + 1) + " of " + questions.length + "</h3><h3 style='font-size: 24px; font-weight: 500; margin-bottom: 25px; line-height: 1.4;'>" + q.question + "</h3>";

            for (let opt of q.options) {
                let checked = answers[index] === opt ? "checked" : "";
                html += `
                <label class="option" onclick="selectOption('${opt.replace(/'/g, "\\'")}')">
                    <input type="radio" name="option" value="${opt}" ${checked} onclick="event.stopPropagation()">
                    ${opt}
                </label>`;
            }

            // re-trigger animation hack for smooth transition
            let quizDiv = document.getElementById("quiz");
            quizDiv.style.animation = 'none';
            quizDiv.offsetHeight; /* trigger reflow */
            quizDiv.style.animation = null;

            quizDiv.innerHTML = html;

            updatePaletteUI();

            // update progress bar width smoothly
            document.getElementById("progress").style.width = ((index + 1) / questions.length * 100) + "%";
        }

        window.selectOption = function (opt) {
            let rd = document.querySelector(`input[name="option"][value="${opt}"]`);
            if (rd) { rd.checked = true; }
            answers[index] = opt;
            updatePaletteUI();
        }

        window.nextQuestion = function () {
            let selected = document.querySelector('input[name="option"]:checked');
            if (selected) answers[index] = selected.value;

            if (index < questions.length - 1) {
                index++;
                loadQuestion();
            } else {
                let unansweredCount = questions.length - Object.keys(answers).length;
                if (unansweredCount > 0) {
                    if (confirm(`You have ${unansweredCount} unanswered questions.\nAre you sure you want to completely submit your exam?`)) {
                        finishExam();
                    }
                } else {
                    finishExam();
                }
            }
        }

        window.prevQuestion = function () {
            let selected = document.querySelector('input[name="option"]:checked');
            if (selected) answers[index] = selected.value;

            if (index > 0) {
                index--;
                loadQuestion();
            }
        }

        function finishExam() {
            clearInterval(timer);
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(err => console.log(err));
            }

            document.getElementById("examContainer").style.display = "none";

            answers.forEach((ans, i) => {
                if (ans === questions[i].answer) score++;
            });

            let accuracy = (score / questions.length) * 100;

            document.getElementById("result").innerHTML =
                `Score: ${score} / ${questions.length} <br>
                 <span style="font-size:16px; color: var(--text-muted);">Accuracy: ${accuracy.toFixed(2)}%</span>`;

            document.getElementById("certificate").style.display = "block";
            document.getElementById("certScore").innerText = accuracy.toFixed(2) + "%";

            let date = new Date().toLocaleDateString();
            document.getElementById("certDate").innerText = date;

            let id = "CERT-" + Math.floor(100000 + Math.random() * 900000); // 6 digits
            document.getElementById("certID").innerText = id;

            let name = document.getElementById("certName").innerText;
            saveResult(name, score, accuracy);

            // Retrigger main container animation for the certificate screen
            let cont = document.getElementById("mainContainer");
            cont.style.animation = 'none';
            cont.offsetHeight;
            cont.style.animation = 'slideUp 0.6s ease-out forwards';
        }

        window.downloadCertificate = function () {
            if (!window.jspdf) {
                alert("jsPDF library not loaded yet.");
                return;
            }
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF("landscape");

            // Fill background with dark slate color
            doc.setFillColor(30, 41, 59);
            doc.rect(0, 0, 300, 210, "F");

            // Add text and titles
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(40);
            doc.text("Certificate of Completion", 150, 60, null, null, "center");

            doc.setFontSize(20);
            doc.text("This certifies that", 150, 90, null, null, "center");

            // Highlight name with primary color
            doc.setTextColor(99, 102, 241);
            doc.setFontSize(30);
            doc.text(document.getElementById("certName").innerText, 150, 110, null, null, "center");

            // Subtitle text
            doc.setTextColor(200, 200, 200);
            doc.setFontSize(16);
            doc.text("Has successfully completed the Online Examination", 150, 130, null, null, "center");

            doc.text("Score: " + document.getElementById("certScore").innerText, 150, 150, null, null, "center");

            // Footer Details
            doc.setFontSize(12);
            doc.text("Date: " + document.getElementById("certDate").innerText, 50, 180);
            doc.text("ID: " + document.getElementById("certID").innerText, 200, 180);

            doc.save(`Certificate_${document.getElementById("certName").innerText.replace(/ /g, "_")}.pdf`);
        }
    </script>
</body>

</html>
