<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee List | Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <a th:href="@{/}" class="back-link">← Back to Home</a>
        <h1>Employee Dashboard</h1>
        
        <div class="card">
            <table class="employee-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Designation</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${employees}">
                        <td th:text="${emp.id}">101</td>
                        <td th:text="${emp.name}">John Doe</td>
                        <td><span class="badge" th:text="${emp.department}">Engineering</span></td>
                        <td th:text="${emp.designation}">Developer</td>
                        <td>
                            <a th:href="@{/employees/{id}(id=${emp.id})}" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">View Profile</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
