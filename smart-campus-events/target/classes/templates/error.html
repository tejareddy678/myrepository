<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head th:replace="~{layout :: head}">
    <title>Error - Smart Campus Events</title>
</head>
<body>
    <div th:fragment="content">
        <section class="hero" style="margin-top: 5rem;">
            <div style="font-size: 5rem; color: #ef4444; margin-bottom: 2rem;">&excl;</div>
            <h1>Something went wrong</h1>
            <p style="font-size: 1.2rem; max-width: 600px; margin: 1rem auto;" th:text="${message} ?: 'An unexpected error occurred. Please try again later.'"></p>
            
            <div style="margin-top: 3rem;">
                <a th:href="@{/}" class="btn btn-primary" style="padding: 1rem 2rem;">Return to Homepage</a>
            </div>
        </section>
    </div>
</body>
</html>
