<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'Smart Campus Events'">Smart Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg"></div>
    
    <header th:fragment="nav">
        <div class="logo">CAMPUS EVENT HUB</div>
        <nav class="nav-links">
            <a th:href="@{/}" style="color: var(--text-primary); text-decoration: none; font-weight: 500;">Home</a>
            <a th:href="@{/}" style="color: var(--text-primary); text-decoration: none; font-weight: 500; margin-left: 2rem;">All Events</a>
            <a sec:authorize="isAnonymous()" th:href="@{/login}" style="color: var(--text-primary); text-decoration: none; font-weight: 500; margin-left: 2rem;">Admin Login</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}" style="color: var(--text-primary); text-decoration: none; font-weight: 500; margin-left: 2rem;">Dashboard</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn" style="background:transparent; color:var(--text-secondary);">Logout</button>
            </form>
        </nav>
    </header>

    <div class="container">
        <div th:replace="~{::content}"></div>
    </div>

    <footer style="text-align: center; padding: 2rem; color: var(--text-secondary); margin-top: 4rem; border-top: 1px solid var(--glass-border);">
        <p>&copy; 2024 Smart Campus Event Management. All rights reserved.</p>
    </footer>
</body>
</html>
