<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head th:replace="~{layout :: head}">
    <title>Manage Event - Smart Campus Events</title>
</head>
<body>
    <div th:fragment="content">
        <section class="hero" style="padding-bottom: 0;">
            <h1 th:text="${event.id == null ? 'Create New Event' : 'Edit Event'}">Manage Event</h1>
            <p>Enter the details below to publish the event</p>
        </section>

        <form th:action="@{/admin/events/save}" th:object="${event}" method="post" class="glass-form">
            <input type="hidden" th:field="*{id}">
            
            <div class="form-group">
                <label for="title">Event Title</label>
                <input type="text" th:field="*{title}" placeholder="e.g. AI Symposium 2024" required>
                <div class="error-message" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="department">Host Department</label>
                    <select th:field="*{department}" required>
                        <option value="">Select Dept</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Arts & Science">Arts & Science</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="type">Event Type</label>
                    <select th:field="*{type}" required>
                        <option value="">Select Type</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Seminar">Seminar</option>
                        <option value="Cultural">Cultural</option>
                        <option value="Tech Fest">Tech Fest</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="eventDate">Date & Time</label>
                    <input type="datetime-local" th:field="*{eventDate}" required>
                    <div class="error-message" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}"></div>
                </div>
                <div class="form-group">
                    <label for="capacity">Student Capacity</label>
                    <input type="number" th:field="*{capacity}" min="1" required>
                    <div class="error-message" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="location">Location / Venue</label>
                <input type="text" th:field="*{location}" placeholder="e.g. Auditorium A, Room 302" required>
            </div>

            <div class="form-group">
                <label for="description">Event Description</label>
                <textarea th:field="*{description}" rows="4" placeholder="Describe what the event is about..." required></textarea>
                <div class="error-message" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2; padding: 1rem;">Save Event</button>
                <a th:href="@{/admin/dashboard}" class="btn" style="flex: 1; background: rgba(255,255,255,0.1); text-align: center; padding: 1rem;">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
