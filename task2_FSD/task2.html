<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Retrieval & Sorting Dashboard | Premium</title>
    <!-- Modern Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #ec4899;
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-hover: rgba(51, 65, 85, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        /* Animated Background Gradients & Shapes */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            filter: blur(100px);
            border-radius: 50%;
            animation: float 12s infinite ease-in-out alternate;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.25);
            top: -10%;
            left: -5%;
        }

        .shape-2 {
            width: 600px;
            height: 600px;
            background: rgba(236, 72, 153, 0.2);
            bottom: -20%;
            right: -10%;
            animation-delay: -6s;
        }

        .shape-3 {
            width: 400px;
            height: 400px;
            background: rgba(56, 189, 248, 0.2);
            top: 40%;
            left: 30%;
            animation-duration: 15s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(60px) scale(1.1);
            }
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 18px;
        }

        /* Controls Area (Filter & Sort) */
        .controls-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .controls-glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-group label {
            font-weight: 500;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select {
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            min-width: 180px;
        }

        /* Custom arrow for select */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        select:focus,
        select:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            background: rgba(15, 23, 42, 0.8);
        }

        select option {
            background-color: var(--bg-color);
            color: white;
            padding: 10px;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Department Stats Sidebar */
        .stats-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            height: fit-content;
        }

        .stats-panel h3 {
            font-size: 22px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .stat-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .stat-dept-name {
            font-weight: 500;
        }

        .stat-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
        }

        /* Table Area */
        .table-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 0, 0, 0.2);
            text-align: left;
            padding: 20px 25px;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 18px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover td {
            background: rgba(255, 255, 255, 0.04);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .name-wrapper {
            display: flex;
            align-items: center;
        }

        .dept-tag {
            background: rgba(139, 92, 246, 0.15);
            color: #a78bfa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .date-text {
            color: var(--text-muted);
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: var(--text-muted);
            width: 100%;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Background Animations -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <h1>Overview Dashboard</h1>
        <p class="subtitle">Review, sort, and analyze your organizational records easily.</p>

        <!-- Filters & Sorting -->
        <div class="controls-glass">
            <div class="control-group">
                <label for="filterDept"><i class="fa-solid fa-filter"></i> Filter by Department:</label>
                <div class="select-wrapper">
                    <select id="filterDept" onchange="fetchData()">
                        <option value="All">All Departments</option>
                        <!-- Options injected dynamically -->
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label for="sortMode"><i class="fa-solid fa-arrow-down-a-z"></i> Sort Automatically by:</label>
                <div class="select-wrapper">
                    <select id="sortMode" onchange="fetchData()">
                        <option value="name">Name (A-Z)</option>
                        <option value="date">Date Added (Newest)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">

            <!-- Statistics Panel -->
            <div class="stats-panel">
                <h3><i class="fa-solid fa-chart-pie"></i> Population Count</h3>
                <div id="statsContainer">
                    <!-- Stats injected dynamically -->
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Employee / Student Name</th>
                            <th>Department Name</th>
                            <th>Registration Date</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Table rows injected dynamically -->
                        <tr>
                            <td colspan="3">
                                <div class="loading">
                                    <div class="spinner"></div><br>Loading records...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Frontend Logic -->
    <script>
        let initializedSelect = false;

        async function fetchData() {
            const tableBody = document.getElementById("tableBody");
            const statsContainer = document.getElementById("statsContainer");

            const filter = document.getElementById("filterDept").value;
            const sort = document.getElementById("sortMode").value;

            try {
                tableBody.innerHTML = `<tr><td colspan="3"><div class="loading"><div class="spinner"></div><br>Fetching records...</div></td></tr>`;

                const response = await fetch(`task2.php?department=${encodeURIComponent(filter)}&sort=${encodeURIComponent(sort)}`);
                const data = await response.json();

                if (data.error) {
                    tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color: #ef4444; padding:30px;">Error: ${data.error}</td></tr>`;
                    return;
                }

                // Populate Stats Panel & Dropdown
                populateStatsAndFilter(data.counts);

                // Populate Table
                populateTable(data.records);

            } catch (e) {
                console.error("Failed to fetch", e);
                tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color: #ef4444; padding:30px;">Failed to connect to server. Ensure XAMPP is running!</td></tr>`;
            }
        }

        function populateStatsAndFilter(counts) {
            const statsContainer = document.getElementById("statsContainer");
            const filterDropdown = document.getElementById("filterDept");

            let currentSelection = filterDropdown.value;

            statsContainer.innerHTML = '';

            if (!initializedSelect && counts.length > 0) {
                let optionsHtml = '<option value="All">All Departments</option>';
                counts.forEach(item => {
                    optionsHtml += `<option value="${item.department}">${item.department}</option>`;
                });
                filterDropdown.innerHTML = optionsHtml;
                filterDropdown.value = currentSelection; // retain selection
                initializedSelect = true; // only populate dropdown options once
            }

            if (counts.length === 0) {
                statsContainer.innerHTML = `<p style="color: var(--text-muted); text-align: center;">No data available.</p>`;
                return;
            }

            counts.forEach((item, index) => {
                // Add staggered animation delay
                let delay = index * 0.1;
                statsContainer.innerHTML += `
                    <div class="stat-card" style="animation: fadeIn 0.5s ease forwards ${delay}s; opacity: 0; transform: translateY(10px);">
                        <div class="stat-dept-name">${item.department}</div>
                        <div class="stat-badge">${item.total}</div>
                    </div>
                `;
            });
        }

        function populateTable(records) {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = '';

            if (records.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: var(--text-muted);"><i class="fa-solid fa-box-open" style="font-size:30px; margin-bottom:15px; opacity:0.5;"></i><br>No records found.</td></tr>`;
                return;
            }

            records.forEach(row => {
                // Generate Initials
                const initials = row.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

                // Format Date nicely
                const dateObj = new Date(row.date_added);
                const prettyDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

                tableBody.innerHTML += `
                    <tr>
                        <td>
                            <div class="name-wrapper">
                                <div class="avatar">${initials}</div>
                                <span style="font-weight: 500;">${row.name}</span>
                            </div>
                        </td>
                        <td>
                            <span class="dept-tag">${row.department}</span>
                        </td>
                        <td>
                            <span class="date-text"><i class="fa-regular fa-calendar-days" style="margin-right: 5px;"></i> ${prettyDate}</span>
                        </td>
                    </tr>
                `;
            });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>

</html>
